name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'itxryx.com/prod/terraform.tfstate' }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
  TF_VAR_domain_name: ${{ vars.DOMAIN_NAME || 'itxryx.com' }}
  TF_VAR_www_domain_name: ${{ vars.WWW_DOMAIN_NAME || 'www.itxryx.com' }}
  TF_VAR_hosted_zone_id: ${{ vars.ROUTE53_HOSTED_ZONE_ID }}
  TF_VAR_acm_certificate_arn: ${{ vars.ACM_CERTIFICATE_ARN }}
  TF_VAR_site_bucket_name: ${{ vars.SITE_BUCKET_NAME }}

jobs:
  deploy:
    name: Build, Provision, and Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.PRODUCTION_DEPLOY_ENABLED == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform

      - name: Validate required variables
        run: |
          test -n "$TF_STATE_BUCKET"
          test -n "$TF_LOCK_TABLE"
          test -n "$TF_STATE_KEY"
          test -n "$TF_VAR_hosted_zone_id"
          test -n "$TF_VAR_acm_certificate_arn"
          test -n "$TF_VAR_site_bucket_name"

      - name: Terraform init
        working-directory: terraform/environments/prod
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: terraform/environments/prod
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform/environments/prod
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: terraform/environments/prod
        run: terraform apply -auto-approve tfplan

      - name: Read Terraform outputs
        id: terraform_outputs
        working-directory: terraform/environments/prod
        run: |
          echo "site_bucket=$(terraform output -raw site_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "site_distribution_id=$(terraform output -raw site_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "www_redirect_distribution_id=$(terraform output -raw www_redirect_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Sync static files to S3
        run: |
          aws s3 sync out/ "s3://${{ steps.terraform_outputs.outputs.site_bucket }}/" \
            --delete \
            --cache-control "public, max-age=300"

      - name: Invalidate CloudFront distributions
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.terraform_outputs.outputs.site_distribution_id }}" \
            --paths "/*"
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.terraform_outputs.outputs.www_redirect_distribution_id }}" \
            --paths "/*"
